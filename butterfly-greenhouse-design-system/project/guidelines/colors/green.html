<!-- @dsCard group="Colors" viewport="700x180" name="Tropical Greens" subtitle="Foliage & canopy" -->
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
  .row{display:flex;gap:0}
  .sw{flex:1;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:12px;color:var(--white)}
  .sw.dark{color:var(--ink-900)}
  .label{font-weight:600}
  .val{opacity:.75;font-size:11px}
</style>
<div class="row">
  <div class="sw" style="background:var(--green-900)"><span class="label">900</span><span class="val">green-900</span></div>
  <div class="sw" style="background:var(--green-700)"><span class="label">700</span><span class="val">green-700</span></div>
  <div class="sw" style="background:var(--green-600)"><span class="label">600</span><span class="val">green-600</span></div>
  <div class="sw" style="background:var(--green-400)"><span class="label">400</span><span class="val">green-400</span></div>
  <div class="sw dark" style="background:var(--green-200)"><span class="label">200</span><span class="val">green-200</span></div>
</div>
