<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Text" subtitle="Warm near-black text colors" -->
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
  .row{display:flex;gap:0}
  .sw{flex:1;height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:12px;color:var(--white)}
  .label{font-weight:600}
  .val{opacity:.75;font-size:11px}
</style>
<div class="row">
  <div class="sw" style="background:var(--ink-900)"><span class="label">900</span><span class="val">ink-900 (primary text)</span></div>
  <div class="sw" style="background:var(--ink-700)"><span class="label">700</span><span class="val">ink-700</span></div>
  <div class="sw" style="background:var(--ink-500)"><span class="label">500</span><span class="val">ink-500 (secondary)</span></div>
  <div class="sw" style="background:var(--ink-300);color:var(--ink-900)"><span class="label">300</span><span class="val">ink-300</span></div>
</div>
