<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
  .row{display:flex;gap:0}
  .sw{flex:1;height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:12px;color:var(--ink-900)}
  .label{font-weight:600}
  .val{opacity:.85;font-size:11px}
</style>
<div class="row">
  <div class="sw" style="background:var(--pink-500)"><span class="label">Pink</span><span class="val">pink-500</span></div>
  <div class="sw" style="background:var(--sky-500)"><span class="label">Sky Blue</span><span class="val">sky-500</span></div>
  <div class="sw" style="background:var(--amber-500)"><span class="label">Amber</span><span class="val">amber-500</span></div>
  <div class="sw" style="background:var(--red-600);color:var(--white)"><span class="label">Red</span><span class="val">red-600</span></div>
</div>
