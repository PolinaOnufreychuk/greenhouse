<!-- @dsCard group="Colors" viewport="700x180" name="Brand Orange" subtitle="Primary — sampled from the logo mark" -->
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
  .row{display:flex;gap:0}
  .sw{flex:1;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:12px;color:var(--white)}
  .sw.dark{color:var(--ink-900)}
  .label{font-weight:600}
  .val{opacity:.75;font-size:11px}
</style>
<div class="row">
  <div class="sw" style="background:var(--orange-900)"><span class="label">900</span><span class="val">orange-900</span></div>
  <div class="sw" style="background:var(--orange-700)"><span class="label">700</span><span class="val">orange-700</span></div>
  <div class="sw" style="background:var(--orange-600)"><span class="label">600</span><span class="val">#E85B0E</span></div>
  <div class="sw" style="background:var(--orange-500)"><span class="label">500</span><span class="val">orange-500</span></div>
  <div class="sw dark" style="background:var(--orange-400)"><span class="label">400</span><span class="val">orange-400</span></div>
  <div class="sw dark" style="background:var(--orange-200)"><span class="label">200</span><span class="val">orange-200</span></div>
  <div class="sw dark" style="background:var(--orange-100)"><span class="label">100</span><span class="val">orange-100</span></div>
</div>
