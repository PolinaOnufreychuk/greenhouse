<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals" subtitle="Paper, sand & greenhouse light" -->
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-page)}
  .row{display:flex;gap:0}
  .sw{flex:1;height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:12px;color:var(--ink-900);border-right:1px solid rgba(0,0,0,.05)}
  .label{font-weight:600}
  .val{opacity:.75;font-size:11px}
</style>
<div class="row">
  <div class="sw" style="background:var(--cream-100)"><span class="label">100</span><span class="val">cream-100</span></div>
  <div class="sw" style="background:var(--cream-200)"><span class="label">200</span><span class="val">cream-200</span></div>
  <div class="sw" style="background:var(--cream-300)"><span class="label">300</span><span class="val">cream-300</span></div>
  <div class="sw" style="background:var(--sand-400)"><span class="label">400</span><span class="val">sand-400</span></div>
  <div class="sw" style="background:var(--sand-600);color:var(--white)"><span class="label">600</span><span class="val">sand-600</span></div>
</div>
